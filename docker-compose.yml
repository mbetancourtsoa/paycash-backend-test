services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-itemdb}
      POSTGRES_USER: ${POSTGRES_USER:-itemuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-itempass}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itemuser} -d ${POSTGRES_DB:-itemdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-itemdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-itemuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-itempass}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
