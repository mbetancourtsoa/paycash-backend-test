spring.application.name=item-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/itemdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:itemuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:itempass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

springdoc.swagger-ui.path=/swagger-ui.html
